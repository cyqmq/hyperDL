name: Build executables

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: win-x64
            python: "3.12"
          - os: ubuntu-latest
            name: linux-x64
            python: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: pip install pyinstaller requests

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install pyinstaller requests

      - name: Build executables
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python build_scripts/build_exe.py

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if (-not $tag) { $tag = "dev-build" }
          $files = Get-ChildItem dist/*.exe,dist/hyperdownloader-* -File
          foreach ($f in $files) {
            gh release upload "$tag" $f.FullName --clobber
            Write-Host "  ✅ $($f.Name)"
          }
        shell: pwsh

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperdownloader-${{ matrix.name }}
          path: dist/hyperdownloader-*
